  /* ============================================================
     FAQ TOGGLE
  ============================================================ */
  function toggleFaq(i) {
    const item = document.getElementById('faq-item-' + i);
    const btn  = item.querySelector('.faq-q');
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(el => {
      el.classList.remove('open');
      el.querySelector('.faq-q').setAttribute('aria-expanded', 'false');
    });
    if (!isOpen) {
      item.classList.add('open');
      btn.setAttribute('aria-expanded', 'true');
    }
  }

  function selectCategory(catId) {
    state.category = catId;
    const brand = BRANDS.find(b => b.id === state.brand);

    const parts = PARTS[catId] || [];
    showPage('pg-parts');
    setBreadcrumb(['Home', brand.name, state.model, cat.name]);
    document.getElementById('pg-parts').innerHTML = `
      <div class="page-header">
        <button class="back-btn" onclick="selectModel('${state.model}')" aria-label="Back to Categories">← Back to Categories</button>

      </div>

               placeholder="Search parts…" oninput="filterParts()"

      <div class="parts-grid" id="parts-grid" role="list">
        ${parts.map(p => `

  }

  function filterParts() {
    const q = document.getElementById('part-search').value.toLowerCase();
    document.querySelectorAll('.part-card').forEach(c => {
      c.style.display = c.dataset.name.includes(q) ? 'flex' : 'none';

  }
